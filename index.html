<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sensor Installer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/@zxing/browser@latest"></script>
<style>
body { font-family: sans-serif; padding: 20px; background: #f4f4f7; color: #222; margin: 0; }
h2 { margin-bottom: 20px; text-align: center; font-size: 24px; }
.container { max-width: 500px; margin: auto; }
button { padding: 16px; font-size: 18px; width: 100%; border: none; border-radius: 10px; background: #007bff; color: white; margin-top: 12px; cursor: pointer; }
button:hover { background: #005fcc; }
#status, #output { margin-top: 16px; padding: 12px; background: white; border-radius: 10px; min-height: 40px; }
#camera-wrapper { width: 100%; margin-top: 20px; display: none; }
#video { width: 100%; aspect-ratio: 1 / 1; background: black; border-radius: 12px; object-fit: cover; }
#zoomSlider { width: 100%; margin-top: 12px; display:none; }
</style>
</head>
<body>
<div class="container">
<h2>Sensor Installation Helper</h2>
<button onclick="startScan('mapping')">Scan Mapping QR</button>
<div id="status"></div>
<button onclick="startScan('sensor')">Scan Sensor QR</button>
<div id="output"></div>
<div id="camera-wrapper">
<video id="video" playsinline></video>
<input type="range" id="zoomSlider" min="1" max="10" step="0.1" value="1">
</div>
</div>
<script>
let mapping = null;
let mode = null;
let codeReader = null;
let stream = null;
async function startScan(type) {
 mode = type;
 document.getElementById('camera-wrapper').style.display = 'block';
 const video = document.getElementById('video');
 codeReader = new ZXingBrowser.BrowserMultiFormatReader();
 stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }});
 video.srcObject = stream;
 await video.play();
 const track = stream.getVideoTracks()[0];
 const caps = track.getCapabilities();
 const slider = document.getElementById('zoomSlider');
 if (caps.zoom) {
   slider.style.display = 'block';
   slider.min = caps.zoom.min;
   slider.max = caps.zoom.max;
   slider.value = caps.zoom.min;
   slider.oninput = async () => {
      await track.applyConstraints({ advanced: [{ zoom: slider.value }] });
   };
 }
 codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
   if (result) { handleScan(result.text); stopScan(); }
 });
}
function stopScan() {
 document.getElementById('camera-wrapper').style.display = 'none';
 if (codeReader) codeReader.reset();
 if (stream) stream.getTracks().forEach(t => t.stop());
}
function handleScan(text) {
 if (mode === 'mapping') {
   try { mapping = JSON.parse(text); document.getElementById('status').innerText = '✔ Mapping loaded (' + Object.keys(mapping).length + ' entries)'; }
   catch { document.getElementById('status').innerText = '❌ Invalid JSON mapping'; }
   return;
 }
 if (!mapping) { document.getElementById('status').innerText = '⚠ Scan mapping first.'; return; }
 const pos = mapping[text];
 document.getElementById('output').innerHTML = pos ? `<b>${text}</b> → ${pos}` : `<b>${text}</b> → <span style="color:red">Not found</span>`;
}
if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');
</script>
</body>
</html>
